<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Triglyceride - Parallel Tails</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
        }
        .legend {
            margin-top: 5px;
            font-size: 0.9em;
        }
        .dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div id="info">
        <h2>Triglyceride Molecule (Parallel Saturated Tails)</h2>
        <p>Left Click + Drag to Rotate | Scroll to Zoom</p>
        <div class="legend"><span class="dot" style="background: #333;"></span> Carbon (C)</div>
        <div class="legend"><span class="dot" style="background: #ff3333;"></span> Oxygen (O)</div>
        <div class="legend"><span class="dot" style="background: #ffffff; border: 1px solid #000;"></span> Hydrogen (H)</div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 2, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(20, 20, 20);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight2.position.set(-20, -20, -20);
        scene.add(dirLight2);

        const colors = { C: 0x333333, O: 0xff3333, H: 0xffffff };
        const radii = { C: 0.5, O: 0.4, H: 0.25 };

        const atomsData = [];
        const bondsData = [];

        function addAtom(type, x, y, z) {
            atomsData.push([type, x, y, z]);
            return atomsData.length - 1;
        }

        // --- 1. GLYCEROL BACKBONE ---
        const gC1 = addAtom('C', -6.0,  3.0, 0.0);
        const gC2 = addAtom('C', -6.0,  0.0, 0.0);
        const gC3 = addAtom('C', -6.0, -3.0, 0.0);

        const gH1 = addAtom('H', -6.8,  3.5,  0.6);
        const gH2 = addAtom('H', -6.8,  3.5, -0.6);
        const gH3 = addAtom('H', -6.8,  0.0,  0.8);
        const gH4 = addAtom('H', -6.8, -3.5,  0.6);
        const gH5 = addAtom('H', -6.8, -3.5, -0.6);

        bondsData.push([gC1, gC2], [gC2, gC3]);
        bondsData.push([gC1, gH1], [gC1, gH2], [gC2, gH3], [gC3, gH4], [gC3, gH5]);

        // --- 2. GENERATE THREE PARALLEL TAILS ---
        const rowY = [3.0, 0.0, -3.0]; 

        for (let row = 0; row < 3; row++) {
            const yOffset = rowY[row];

            const oSingle = addAtom('O', -4.5, yOffset, 0.0);
            const cDouble = addAtom('C', -3.2, yOffset, 0.0);
            const oDouble = addAtom('O', -3.2, yOffset + 1.1, 0.0); // Ester oxygen pointing straight up

            if (row === 0) bondsData.push([gC1, oSingle]);
            if (row === 1) bondsData.push([gC2, oSingle]);
            if (row === 2) bondsData.push([gC3, oSingle]);

            bondsData.push([oSingle, cDouble], [cDouble, oDouble]);

            let lastChainC = cDouble;
            let currentX = -1.8;
            const chainLength = 12;

            for (let i = 0; i < chainLength; i++) {
                // Alternating up/down steps to produce the rigid zig-zag pattern
                let stepY = (i % 2 === 0 ? -0.5 : 0.5);
                
                let nextX = currentX + 1.2;
                let nextY = yOffset + stepY;
                let nextZ = 0.0; // All elements locked to a uniform flat 2D projection plane

                const newC = addAtom('C', nextX, nextY, nextZ);
                bondsData.push([lastChainC, newC]);

                // Hydrogens placed symmetrically along the Z axis
                const hSide1 = addAtom('H', nextX, nextY, nextZ + 0.8);
                const hSide2 = addAtom('H', nextX, nextY, nextZ - 0.8);
                bondsData.push([newC, hSide1], [newC, hSide2]);

                if (i === chainLength - 1) {
                    const hTerminal = addAtom('H', nextX + 0.8, nextY, nextZ);
                    bondsData.push([newC, hTerminal]);
                }

                lastChainC = newC;
                currentX = nextX;
            }
        }

        // --- 3. Build Meshes ---
        const atomPositions = [];
        const sphereGeometryCache = {};

        atomsData.forEach((atom) => {
            const type = atom[0];
            const pos = new THREE.Vector3(atom[1], atom[2], atom[3]);
            atomPositions.push(pos);

            if (!sphereGeometryCache[type]) {
                sphereGeometryCache[type] = new THREE.SphereGeometry(radii[type], 24, 24);
            }

            const material = new THREE.MeshStandardMaterial({
                color: colors[type],
                roughness: 0.2,
                metalness: 0.1
            });

            const mesh = new THREE.Mesh(sphereGeometryCache[type], material);
            mesh.position.copy(pos);
            scene.add(mesh);
        });

        bondsData.forEach((bond) => {
            const p1 = atomPositions[bond[0]];
            const p2 = atomPositions[bond[1]];

            const distance = p1.distanceTo(p2);
            const position = p1.clone().lerp(p2, 0.5);

            const cylinderGeometry = new THREE.CylinderGeometry(0.08, 0.08, distance, 16);
            const cylinderMaterial = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.4 });
            const cylinder = new THREE.Mesh(cylinderGeometry, cylinderMaterial);

            cylinder.position.copy(position);
            
            const direction = new THREE.Vector3().subVectors(p2, p1).normalize();
            const alignVector = new THREE.Vector3(0, 1, 0);
            cylinder.quaternion.setFromUnitVectors(alignVector, direction);

            scene.add(cylinder);
        });

        // --- 4. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
