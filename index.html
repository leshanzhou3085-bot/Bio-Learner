<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Biology Visualizer</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(to bottom, #0f172a, #020617);
      color: white;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.3rem;
      color: #cbd5e1;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: black;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>AI Biology Visualizer</h1>

    <p>
      Learn biology through interactive visuals,
      simulations, and AI-powered explanations.
    </p>

    <button onclick="startLearning()">
      Start Learning
    </button>
  </div>

  <script>
    function startLearning() {
      alert("Welcome to the future of biology learning.");
    }
  </script>

</body>
</html>
